name=IoTDataHub
version=1.1.0
author=Emmanuel SHYIRAMBERE
maintainer=Emmanuel SHYIRAMBERE
sentence=IoTDataHub client library for ESP32, ESP8266, Pico W, MKR, Ethernet, GSM and NB-IoT boards.
paragraph=Drop-in library that abstracts WiFi/Ethernet/GSM connection, MQTT with LWT, and virtual pin dispatch. Users only write IoTDATAHUB_WRITE(Vx) / IoTDATAHUB_READ(Vx) handlers and call IoTDataHub.begin() / IoTDataHub.run(). Supports ESP32, ESP8266, Raspberry Pi Pico W (RP2040), Arduino MKR WiFi 1010, Nano 33 IoT, Arduino Ethernet W5100/W5500, ENC28J60, TinyGSM (SIM800/SIM900/SIM7600), Arduino MKR GSM 1400, Arduino MKR NB 1500, and STM32 with ESP8266 AT shield.
category=Communication
url=https://github.com/iotpioneers/iotdatahub-library
architectures=esp32,esp8266,rp2040,samd,nrf52,avr,stm32
depends=PubSubClient
